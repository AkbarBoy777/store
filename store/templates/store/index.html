<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Store</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .image {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Products</h1>
    {% for product in products %}
        <img class="image" src="{{ product.image_url }}" alt="image of `{{ product }}`">
        <a href="{{ product.get_absolute_url }}">{{ product.title }}</a>
    {% endfor %}
</div>
</body>

</html>
<h1>Index</h1>
