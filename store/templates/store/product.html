<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ product.title }}</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main_image {
            width: 400px;
            height: 400px;
        }
        .related_image {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>{{ product.title|title }}</h1>
    <img class="main_image" src="{{ product.image_url }}" alt="image of {{ product.title }}">
    <p>Description: {{ product.description }}</p>
    <h2>Price: {{ product.price }}</h2>
    <h3>Recently Viewed</h3>
    <div class="related">
        {% for related_product in related_products %}
            <a href="{{ related_product.get_absolute_url }}">
                <img src="{{ related_product.image_url }}" class="related_image" alt="">
            </a>
        {% endfor %}
    </div>
</div>

</body>
</html>
